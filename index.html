<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolHub - Free Online Tools</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f6ff;
    color:#222;
}

.dark{
    background:#121212;
    color:white;
}

header{
    background:#2563eb;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}

.hero{
    text-align:center;
    padding:40px 20px;
}

.hero h1{
    font-size:35px;
}

.search{
    width:90%;
    max-width:500px;
    padding:12px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid #aaa;
}

.container{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.dark .card{
    background:#222;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #bbb;
}

.result{
    margin-top:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<header>
<div class="logo">⚡ ToolHub</div>

<button onclick="darkMode()">
🌙 Mode
</button>
</header>


<section class="hero">

<h1>100+ Free Online Tools</h1>

<p>Fast, Easy & Free Utilities</p>


<input 
class="search"
id="search"
placeholder="Search tools..."
onkeyup="searchTools()">

</section>


<div class="container">

<!-- Age Calculator -->

<div class="card">

<h2>🎂 Age Calculator</h2>

<input type="date" id="dob">

<button onclick="age()">
Calculate
</button>

<p id="ageResult" class="result"></p>

</div>


<!-- BMI Calculator -->

<div class="card">

<h2>⚖ BMI Calculator</h2>

<input type="number" id="weight"
placeholder="Weight in KG">

<input type="number" id="height"
placeholder="Height in CM">


<button onclick="bmi()">
Calculate
</button>

<p id="bmiResult"
class="result"></p>

</div>


<!-- EMI Calculator -->

<div class="card">

<h2>💰 EMI Calculator</h2>

<input id="loan"
type="number"
placeholder="Loan Amount">


<input id="rate"
type="number"
placeholder="Interest Rate">


<input id="months"
type="number"
placeholder="Months">


<button onclick="emi()">
Calculate
</button>

<p id="emiResult"
class="result"></p>

</div>
<!-- Percentage Calculator -->

<div class="card">

<h2>📊 Percentage Calculator</h2>

<input id="total"
type="number"
placeholder="Total Marks">

<input id="obtained"
type="number"
placeholder="Obtained Marks">

<button onclick="percentage()">
Calculate
</button>

<p id="percentageResult"
class="result"></p>

</div>


<!-- Password Generator -->

<div class="card">

<h2>🔐 Password Generator</h2>

<button onclick="generatePassword()">
Generate Password
</button>

<p id="passwordResult"
class="result"></p>

</div>


<!-- QR Code Generator -->

<div class="card">

<h2>🔳 QR Generator</h2>

<input id="qrText"
type="text"
placeholder="Enter text or URL">

<button onclick="generateQR()">
Generate QR
</button>

<div id="qrResult"></div>

</div>


</div>


<footer style="text-align:center;padding:20px;">
© 2026 ToolHub | Free Online Tools
</footer>


<script>

function darkMode(){
document.body.classList.toggle("dark");
}


function searchTools(){

let input =
document.getElementById("search")
.value.toLowerCase();

let cards =
document.querySelectorAll(".card");


cards.forEach(card => {

if(card.innerText.toLowerCase()
.includes(input)){

card.style.display = "block";

}
else{

card.style.display = "none";

}

});

}


// Age Calculator

function age(){

let dob =
new Date(
document.getElementById("dob").value
);

let today = new Date();

let years =
today.getFullYear()
- dob.getFullYear();


let month =
today.getMonth()
- dob.getMonth();


if(month < 0 ||
(month == 0 &&
today.getDate() <
dob.getDate())){

years--;

}


document.getElementById("ageResult")
.innerHTML =
"Your Age: " +
years +
" years";

}


// BMI

function bmi(){

let w =
document.getElementById("weight").value;

let h =
document.getElementById("height").value / 100;

let value =
(w / (h*h)).toFixed(2);


document.getElementById("bmiResult")
.innerHTML =
"Your BMI: " +
value;

}


// EMI

function emi(){

let p =
document.getElementById("loan").value;

let r =
document.getElementById("rate").value / 12 / 100;


let n =
document.getElementById("months").value;


let result =
(p*r*Math.pow(1+r,n))
/
(Math.pow(1+r,n)-1);


document.getElementById("emiResult")
.innerHTML =
"Monthly EMI ₹" +
result.toFixed(2);

}


// Percentage

function percentage(){

let total =
document.getElementById("total").value;


let obtained =
document.getElementById("obtained").value;


let per =
(obtained / total)
*100;


document.getElementById("percentageResult")
.innerHTML =
"Percentage: "
+ per.toFixed(2)
+ "%";

}


// Password Generator

function generatePassword(){

let chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%";

let pass = "";


for(let i=0;i<12;i++){

pass += chars.charAt(
Math.floor(Math.random()
* chars.length));

}


document.getElementById("passwordResult")
.innerHTML = pass;

}


// QR Generator

function generateQR(){

let text =
document.getElementById("qrText").value;


document.getElementById("qrResult").innerHTML =
"<img src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="
+ encodeURIComponent(text)
+ "'>";

}

</script>


</body>
</html>
